apiVersion: apps/v1
kind: Deployment
metadata:
  name: basic-api
  labels:
    app: basic-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: basic-api
  template:
    metadata:
      labels:
        app: basic-api
    spec:
      containers:
        - name: basic-api
          image: docker.io/mp42069/basic-api:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8080

          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5